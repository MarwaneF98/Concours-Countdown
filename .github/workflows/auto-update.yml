name: Auto-Update Tawjihnet News with Gemini AI

on:
  schedule:
    # السكريبت سيعمل كل 12 ساعة لجلب آخر المستجدات
    - cron: '0 */12 * * *'
  
  # يسمح لك بتشغيل التحديث يدوياً بضغطة زر من تبويب Actions في GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Set up Python 3.x
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run AI Scraper
        env:
          # هذا السطر يربط مفتاحك السري المخزن في GitHub بالسكريبت
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scraper.py
        
      - name: Commit and Push Changes
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add tawjihnet_news.json
          
          # الحفظ والدفع فقط في حالة وجود تغييرات حقيقية في ملف الأخبار
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update AI translated news [skip ci]" && git push)
