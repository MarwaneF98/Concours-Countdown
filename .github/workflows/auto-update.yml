name: Auto-Update Exam Dates

# This determines WHEN the script runs
on:
  schedule:
    # Runs at 00:00 every Sunday (Cron syntax)
    - cron: '0 0 * * 0'
  
  # Allows you to click a button in GitHub to run it manually anytime
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Grab your repository's code
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      # 2. Setup the Python environment
      - name: Set up Python 3.x
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      # 3. Install the required libraries
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      # 4. Run the scraper script
      - name: Run Scraper
        run: python scraper.py
        
      # 5. Check if exams.json was modified, and commit/push if it was
      - name: Commit and Push Changes
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add exams.json
          
          # Only commit if there are changes to commit
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update exam dates [skip ci]" && git push)

