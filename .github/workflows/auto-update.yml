name: Auto-Update Tawjihnet News

on:
  schedule:
    # السكريبت سيعمل مرتين في اليوم (كل 12 ساعة)
    - cron: '0 */12 * * *'
  
  # يسمح لك بتشغيل السكريبت يدويا متى شئت بضغطة زر من داخل GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Set up Python 3.x
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Scraper
        run: python scraper.py
        
      - name: Commit and Push Changes
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add tawjihnet_news.json
          
          # سيقوم السيرفر بالحفظ (Commit) فقط إذا وجد أن هناك أخبارا جديدة فعلا
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update translated news [skip ci]" && git push)
